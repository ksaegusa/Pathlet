name: Release Artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: linux-x64
            archive: tar.gz
          - os: macos-latest
            artifact: macos-arm64
            archive: tar.gz
          - os: windows-latest
            artifact: windows-x64
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Build web UI and WASM
        working-directory: web
        run: npm run build

      - name: Build single binary
        run: cargo build --release -p pathlet-app

      - name: Package artifact
        shell: bash
        run: |
          set -euo pipefail

          package_dir="pathlet-${{ matrix.artifact }}"
          mkdir -p "$package_dir"

          if [[ "$RUNNER_OS" == "Windows" ]]; then
            cp target/release/pathlet.exe "$package_dir/pathlet.exe"
          else
            cp target/release/pathlet "$package_dir/pathlet"
            chmod +x "$package_dir/pathlet"
          fi

          cp README.md LICENSE "$package_dir/"

          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            7z a "${package_dir}.zip" "$package_dir"
          else
            tar -czf "${package_dir}.tar.gz" "$package_dir"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pathlet-${{ matrix.artifact }}
          path: pathlet-${{ matrix.artifact }}.${{ matrix.archive }}
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" release-assets/* --clobber
          else
            gh release create "$TAG" release-assets/* --title "$TAG" --generate-notes
          fi
